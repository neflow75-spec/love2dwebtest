    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>Responsive Pong - Strict Fullscreen</title>
        <style>
            /* Lock screen window bounds entirely */
            html, body {
                margin: 0;
                padding: 0;
                background-color: #000;
                width: 100vw;
                height: 100vh;
                height: 100dvh; /* Dynamic calculation for mobile toolbars */
                overflow: hidden;
                font-family: sans-serif;
                position: fixed; 
                touch-action: none; /* Disables browser scrolling pull gestures */
            }
    
            #game-container {
                width: 100%;
                height: 100%;
                box-sizing: border-box;
                padding: 0; /* Stripped padding completely for true edge-to-edge look */
                display: flex;
                justify-content: center;
                align-items: center;
            }
    
            canvas {
                width: 100% !important;
                height: 100% !important;
                background: #000;
                border: none; /* Removed the white border lines */
                display: block;
                box-sizing: border-box;
            }
    
            /* LANDSCAPE FORCE OVERLAY */
            #orientation-overlay {
                display: none; 
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: #111;
                color: #fff;
                z-index: 9999;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
            }
    
            .phone-icon {
                font-size: 50px;
                margin-bottom: 20px;
                animation: rotatePhone 2s infinite ease-in-out;
            }
    
            @keyframes rotatePhone {
                0% { transform: rotate(0deg); }
                50% { transform: rotate(-90deg); }
                100% { transform: rotate(-90deg); }
            }
    
            /* Show rotate warning overlay on tall screens (mobile portrait) */
            @media screen and (max-aspect-ratio: 13/9) and (max-width: 1024px) {
                #orientation-overlay {
                    display: flex;
                }
                #game-container {
                    display: none;
                }
            }
        </style>
    </head>
    <body>
    
    <!-- The Force-Landscape Overlay -->
    <div id="orientation-overlay">
        <div class="phone-icon">📱</div>
        <h2>Please Rotate Your Device</h2>
        <p>This game requires landscape mode.</p>
    </div>
    
    <div id="game-container">
        <canvas id="pongCanvas"></canvas>
    </div>
    
    <script>
    const canvas = document.getElementById("pongCanvas");
    const ctx = canvas.getContext("2d");
    
    // INTERNAL GAME LOGIC HEIGHT (Strictly Maintained)
    const LOGIC_HEIGHT = 600;
    let LOGIC_WIDTH = 800; 
    
    // Game Entities Setup
    const ball = { x: 0, y: 0, radius: 10, speedX: 5, speedY: 5 };
    const paddleWidth = 15;
    const paddleHeight = 100;
    const player = { x: 20, y: 0, score: 0 };
    const ai = { x: 0, y: 0, score: 0 };
    
    function resize() {
        const container = document.getElementById("game-container");
        
        // Explicitly snap game window sizing to active viewport dimensions
        container.style.height = window.innerHeight + "px";
    
        const rect = canvas.getBoundingClientRect();
        if (rect.height === 0) return; 
    
        // Auto-adjust physics width to fill exact aspect ratio of the monitor/screen
        const visualRatio = rect.width / rect.height;
        canvas.height = LOGIC_HEIGHT;
        canvas.width = LOGIC_HEIGHT * visualRatio;
        LOGIC_WIDTH = canvas.width;
    
        // Pin positions nicely against new calculated fluid canvas outer bounds
        player.y = LOGIC_HEIGHT / 2 - paddleHeight / 2;
        ai.x = LOGIC_WIDTH - paddleWidth - 20;
        ai.y = LOGIC_HEIGHT / 2 - paddleHeight / 2;
        
        resetBall();
    }
    
    function resetBall() {
        ball.x = LOGIC_WIDTH / 2;
        ball.y = LOGIC_HEIGHT / 2;
        ball.speedX = (Math.random() > 0.5 ? 6 : -6);
        ball.speedY = (Math.random() * 6) - 3;
    }
    
    // Input Calculations
    function movePaddle(clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleY = LOGIC_HEIGHT / rect.height;
        const canvasY = (clientY - rect.top) * scaleY;
        player.y = canvasY - paddleHeight / 2;
        
        // Bounds check locking
        if (player.y < 0) player.y = 0;
        if (player.y > LOGIC_HEIGHT - paddleHeight) player.y = LOGIC_HEIGHT - paddleHeight;
    }
    
    // Desktop Controls
    window.addEventListener("mousemove", (e) => movePaddle(e.clientY));
    
    // Mobile Touch Controls
    window.addEventListener("touchmove", (e) => {
        if(e.touches && e.touches.length > 0) {
            movePaddle(e.touches[0].clientY);
        }
    }, { passive: false });
    
    // Safeguards preventing multi-touch system drag glitches
    window.addEventListener("touchstart", (e) => { if(e.target === canvas) e.preventDefault(); }, { passive: false });
    window.addEventListener("touchend", (e) => { if(e.target === canvas) e.preventDefault(); }, { passive: false });
    
    function update() {
        ball.x += ball.speedX;
        ball.y += ball.speedY;
    
        // Roof and Floor Bounds Collision Vectors
        if (ball.y - ball.radius < 0 || ball.y + ball.radius > LOGIC_HEIGHT) {
            ball.speedY = -ball.speedY;
        }
    
        // AI Engine calculations
        const aiTarget = ball.y - paddleHeight / 2;
        ai.y += (aiTarget - ai.y) * 0.12; 
    
        // Paddle Hit Intersects
        let paddle = (ball.x < LOGIC_WIDTH / 2) ? player : ai;
        if (detectCollision(ball, paddle)) {
            ball.speedX = -ball.speedX;
            let hitPoint = (ball.y - (paddle.y + paddleHeight/2)) / (paddleHeight/2);
            ball.speedY = hitPoint * 6;
        }
    
        // Goal Checks
        if (ball.x < 0) {
            ai.score++;
            resetBall();
        } else if (ball.x > LOGIC_WIDTH) {
            player.score++;
            resetBall();
        }
    }
    
    function detectCollision(b, p) {
        return b.x + b.radius > p.x && 
               b.x - b.radius < p.x + paddleWidth && 
               b.y + b.radius > p.y && 
               b.y - b.radius < p.y + paddleHeight;
    }
    
    function draw() {
        // Fill deep screen workspace background frame
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, LOGIC_WIDTH, LOGIC_HEIGHT);
    
        // Render Middle Line Markings
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 4;
        ctx.setLineDash([15, 15]); /* Retro dashed layout design aesthetics */
        ctx.beginPath();
        ctx.moveTo(LOGIC_WIDTH / 2, 0);
        ctx.lineTo(LOGIC_WIDTH / 2, LOGIC_HEIGHT);
        ctx.stroke();
    
        // Render Paddles
        ctx.fillStyle = "#fff";
        ctx.fillRect(player.x, player.y, paddleWidth, paddleHeight);
        ctx.fillRect(ai.x, ai.y, paddleWidth, paddleHeight);
    
        // Render Game Ball
        ctx.beginPath();
        ctx.setLineDash([]);
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fill();
    
        // Render Scores Text
        ctx.font = "bold 50px monospace";
        ctx.textAlign = "center";
        ctx.fillText(player.score, LOGIC_WIDTH / 4, 70);
        ctx.fillText(ai.score, (LOGIC_WIDTH / 4) * 3, 70);
    }
    
    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }
    
    // Global Rebuild Listeners
    window.addEventListener("resize", resize);
    window.addEventListener("orientationchange", () => {
        setTimeout(resize, 200); 
    });
    
    // Fire Application Launch Systems
    resize();
    loop();
    </script>
    </body>
    </html>
