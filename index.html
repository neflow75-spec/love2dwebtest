<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LÖVE2D-Style Scale Engine</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Keeps game perfectly centered */
        }
    </style>
</head>
<body>

    <canvas id="screenCanvas"></canvas>

    <script>
        // 1. VISIBLE SCREEN CANVAS (The "Monitor")
        const screenCanvas = document.getElementById('screenCanvas');
        const screenCtx = screenCanvas.getContext('2d');

        // 2. INTERNAL VIRTUAL CANVAS (The "LÖVE2D Game Resolution")
        const gameCanvas = document.createElement('canvas');
        const gameCtx = gameCanvas.getContext('2d');
        
        // Lock your game logic to these dimensions exactly
        gameCanvas.width = 400;  
        gameCanvas.height = 240; 

        // Game State Variables (Values are in "Game Pixels")
        let box = { x: 20, y: 20, size: 40, dx: 2, dy: 2 };

        // 3. THE SCALER ENGINE (Replicating love.resize / Push)
        function resizeScreen() {
            // Get visible mobile/desktop viewport size
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            // Find the best scale factor while preserving aspect ratio (Fit-to-Screen)
            const scale = Math.min(windowWidth / gameCanvas.width, windowHeight / gameCanvas.height);

            // Resize physical canvas element on screen
            screenCanvas.width = gameCanvas.width * scale;
            screenCanvas.height = gameCanvas.height * scale;

            // TOGGLE PIXEL ART SHARPNESS (Like love.graphics.setDefaultFilter("nearest"))
            // Change to true if using high-res vector graphics instead of pixels
            const smoothGraphics = false; 
            screenCtx.imageSmoothingEnabled = smoothGraphics;
            screenCtx.mozImageSmoothingEnabled = smoothGraphics;
            screenCtx.webkitImageSmoothingEnabled = smoothGraphics;
        }

        window.addEventListener('resize', resizeScreen);
        window.addEventListener('orientationchange', resizeScreen);
        resizeScreen(); // Call once at start

        // 4. MAIN GAME LOOP
        function loop() {
            // --- GAME LOGIC (Always relative to virtual gameCanvas) ---
            box.x += box.dx;
            box.y += box.dy;

            if (box.x <= 0 || box.x + box.size >= gameCanvas.width) box.dx *= -1;
            if (box.y <= 0 || box.y + box.size >= gameCanvas.height) box.dy *= -1;

            // --- STEP A: DRAW INTERNALLY (love.draw context) ---
            gameCtx.fillStyle = '#228B22'; // Clean Green Background
            gameCtx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);

            gameCtx.fillStyle = '#FF0000'; // Draw Red Box
            gameCtx.fillRect(box.x, box.y, box.size, box.size);

            // --- STEP B: SCALE TO MONITOR (The love2d engine blit) ---
            // Clear the monitor view
            screenCtx.clearRect(0, 0, screenCanvas.width, screenCanvas.height);
            // Paint the hidden virtual canvas stretched over the visible one
            screenCtx.drawImage(
                gameCanvas, 
                0, 0, gameCanvas.width, gameCanvas.height, // Source coordinates
                0, 0, screenCanvas.width, screenCanvas.height // Destination coordinates
            );

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
