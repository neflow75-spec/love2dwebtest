    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>Responsive Pong - Zoom Fixed</title>
        <style>
            /* Force the browser window to act as an unscrollable, rigid frame */
            html, body {
                margin: 0;
                padding: 0;
                background-color: #111;
                width: 100%;
                height: 100%;
                overflow: hidden;
                font-family: sans-serif;
                position: fixed; 
                touch-action: none; /* Prevents pull-to-refresh mobile browser behaviors */
            }
    
            #game-container {
                width: 100%;
                height: 100%;
                box-sizing: border-box;
                padding: 15px; 
                display: flex;
                justify-content: center;
                align-items: center;
                
                /* Smooth transitions when rotating or scaling */
                transition: transform 0.2s ease-in-out;
                transform-origin: center center;
            }
    
            canvas {
                max-width: 100%;
                max-height: 100%;
                width: auto;
                height: auto;
                background: #000;
                border: 4px solid #fff;
                display: block;
                box-sizing: border-box;
            }
    
            /* LANDSCAPE FORCE OVERLAY */
            #orientation-overlay {
                display: none; /* Hidden unless vertical rules trigger */
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: #111;
                color: #fff;
                z-index: 9999;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
            }
    
            .phone-icon {
                font-size: 50px;
                margin-bottom: 20px;
                animation: rotatePhone 2s infinite ease-in-out;
            }
    
            @keyframes rotatePhone {
                0% { transform: rotate(0deg); }
                50% { transform: rotate(-90deg); }
                100% { transform: rotate(-90deg); }
            }
    
            /* 1. VERTICAL PHONE DETECTOR (Show Warning Overlay) */
            @media screen and (max-aspect-ratio: 13/9) and (max-width: 1024px) {
                #orientation-overlay {
                    display: flex;
                }
                #game-container {
                    display: none;
                }
            }
    
            /* 2. MOBILE ZOOM OUT TRIGGER (Forces a scale reduction on landscape phones) */
            @media screen and (min-aspect-ratio: 13/9) and (max-width: 932px) and (max-height: 500px) {
                #game-container {
                    /* Zooms out to 85% of standard size to clear persistent browser bars */
                    transform: scale(0.85); 
                }
            }
        </style>
    </head>
    <body>
    
    <!-- The Force-Landscape Overlay -->
    <div id="orientation-overlay">
        <div class="phone-icon">📱</div>
        <h2>Please Rotate Your Device</h2>
        <p>This game requires landscape mode.</p>
    </div>
    
    <div id="game-container">
        <canvas id="pongCanvas"></canvas>
    </div>
    
    <script>
    const canvas = document.getElementById("pongCanvas");
    const ctx = canvas.getContext("2d");
    
    // INTERNAL GAME LOGIC VALUES
    const LOGIC_HEIGHT = 600;
    let LOGIC_WIDTH = 800; 
    
    // Game State Values
    const ball = { x: 0, y: 0, radius: 10, speedX: 5, speedY: 5 };
    const paddleWidth = 15;
    const paddleHeight = 100;
    const player = { x: 20, y: 0, score: 0 };
    const ai = { x: 0, y: 0, score: 0 };
    
    function resize() {
        const container = document.getElementById("game-container");
        
        // Explicitly lock the container to actual browser viewable pixel dimensions
        container.style.height = window.innerHeight + "px";
    
        const rect = canvas.getBoundingClientRect();
        if (rect.height === 0) return; // Keeps calculations safe when hidden by overlay
    
        // Recalculate internal coordinate width based on visual aspect layout 
        const visualRatio = rect.width / rect.height;
        canvas.height = LOGIC_HEIGHT;
        canvas.width = LOGIC_HEIGHT * visualRatio;
        LOGIC_WIDTH = canvas.width;
    
        // Adjust entity dimensions relative to structural changes
        player.y = LOGIC_HEIGHT / 2 - paddleHeight / 2;
        ai.x = LOGIC_WIDTH - paddleWidth - 20;
        ai.y = LOGIC_HEIGHT / 2 - paddleHeight / 2;
        
        resetBall();
    }
    
    function resetBall() {
        ball.x = LOGIC_WIDTH / 2;
        ball.y = LOGIC_HEIGHT / 2;
        ball.speedX = (Math.random() > 0.5 ? 6 : -6);
        ball.speedY = (Math.random() * 6) - 3;
    }
    
    // Input Calculations
    function movePaddle(clientY) {
        const rect = canvas.getBoundingClientRect();
        // Maps screen click height to structural 600px coordinates cleanly
        const scaleY = LOGIC_HEIGHT / rect.height;
        const canvasY = (clientY - rect.top) * scaleY;
        player.y = canvasY - paddleHeight / 2;
        
        // Boundary locking
        if (player.y < 0) player.y = 0;
        if (player.y > LOGIC_HEIGHT - paddleHeight) player.y = LOGIC_HEIGHT - paddleHeight;
    }
    
    // Desktop Controls
    window.addEventListener("mousemove", (e) => movePaddle(e.clientY));
    
    // Mobile Touch Controls
    window.addEventListener("touchmove", (e) => {
        if(e.touches.length > 0) {
            movePaddle(e.touches.clientY);
        }
    }, { passive: false });
    
    // Block default touch browser actions on the screen canvas element
    window.addEventListener("touchstart", (e) => { if(e.target === canvas) e.preventDefault(); }, { passive: false });
    window.addEventListener("touchend", (e) => { if(e.target === canvas) e.preventDefault(); }, { passive: false });
    
    function update() {
        // Ball Movement Vectors
        ball.x += ball.speedX;
        ball.y += ball.speedY;
    
        // Floor and Ceiling Collisions
        if (ball.y - ball.radius < 0 || ball.y + ball.radius > LOGIC_HEIGHT) {
            ball.speedY = -ball.speedY;
        }
    
        // AI Follow Calculations
        const aiTarget = ball.y - paddleHeight / 2;
        ai.y += (aiTarget - ai.y) * 0.12; 
    
        // Determine target paddle side 
        let paddle = (ball.x < LOGIC_WIDTH / 2) ? player : ai;
        if (detectCollision(ball, paddle)) {
            ball.speedX = -ball.speedX;
            // Changes reflection angle depending on location hit on the paddle structure
            let hitPoint = (ball.y - (paddle.y + paddleHeight/2)) / (paddleHeight/2);
            ball.speedY = hitPoint * 6;
        }
    
        // Checking Score Zones
        if (ball.x < 0) {
            ai.score++;
            resetBall();
        } else if (ball.x > LOGIC_WIDTH) {
            player.score++;
            resetBall();
        }
    }
    
    function detectCollision(b, p) {
        return b.x + b.radius > p.x && 
               b.x - b.radius < p.x + paddleWidth && 
               b.y + b.radius > p.y && 
               b.y - b.radius < p.y + paddleHeight;
    }
    
    function draw() {
        // Render Background Frame
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, LOGIC_WIDTH, LOGIC_HEIGHT);
    
        // Render Middle Line Markings
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(LOGIC_WIDTH / 2, 0);
        ctx.lineTo(LOGIC_WIDTH / 2, LOGIC_HEIGHT);
        ctx.stroke();
    
        // Render Paddles
        ctx.fillStyle = "#fff";
        ctx.fillRect(player.x, player.y, paddleWidth, paddleHeight);
        ctx.fillRect(ai.x, ai.y, paddleWidth, paddleHeight);
    
        // Render Game Ball
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fill();
    
        // Render Scores Text
        ctx.font = "bold 40px monospace";
        ctx.textAlign = "center";
        ctx.fillText(player.score, LOGIC_WIDTH / 4, 60);
        ctx.fillText(ai.score, (LOGIC_WIDTH / 4) * 3, 60);
    }
    
    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }
    
    // Window Event Listeners
    window.addEventListener("resize", resize);
    window.addEventListener("orientationchange", () => {
        setTimeout(resize, 200); 
    });
    
    // Run Setup Loop
    resize();
    loop();
    </script>
    </body>
    </html>
