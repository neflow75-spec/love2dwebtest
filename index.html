<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Scaling Canvas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111; /* Dark border outside the game arena */
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Fixed virtual world size (the arena size doesn't change, the camera does)
        const WORLD_WIDTH = 800;
        const WORLD_HEIGHT = 800;

        let cameraZoom = 1;

        // Box properties defined strictly in world coordinates
        let box = {
            x: 100,
            y: 100,
            size: 80, 
            speedX: 4,
            speedY: 4
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Calculate scale factors to fit the world into the screen
            let scaleX = canvas.width / WORLD_WIDTH;
            let scaleY = canvas.height / WORLD_HEIGHT;

            if (canvas.width > canvas.height) {
                // LANDSCAPE: Zoom out by using a smaller scale factor (shows more background margins)
                cameraZoom = Math.min(scaleX, scaleY) * 0.75; 
            } else {
                // PORTRAIT: Zoom in to fill as much space as possible
                cameraZoom = Math.min(scaleX, scaleY) * 1.1; 
            }
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', resizeCanvas);
        resizeCanvas();

        function drawGrid(spacing) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; // Soft grid lines
            ctx.lineWidth = 2;
            
            // Draw vertical grid lines
            for (let x = 0; x <= WORLD_WIDTH; x += spacing) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, WORLD_HEIGHT);
                ctx.stroke();
            }
            // Draw horizontal grid lines
            for (let y = 0; y <= WORLD_HEIGHT; y += spacing) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(WORLD_WIDTH, y);
                ctx.stroke();
            }
        }

        function update() {
            // 1. Move box inside world coordinates
            box.x += box.speedX;
            box.y += box.speedY;

            // 2. Physics collision against fixed world walls
            if (box.x <= 0 || box.x + box.size >= WORLD_WIDTH) {
                box.speedX *=-1;
                box.x = Math.max(0, Math.min(box.x, WORLD_WIDTH - box.size));
            }
            if (box.y <= 0 || box.y + box.size >= WORLD_HEIGHT) {
                box.speedY *= -1;
                box.y = Math.max(0, Math.min(box.y, WORLD_HEIGHT - box.size));
            }

            // 3. Clear entire screen with dark canvas background
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 4. Save state, center camera, and apply zoom
            ctx.save();
            
            // Move camera origin to the center of the screen
            ctx.translate(canvas.width / 2, canvas.height / 2);
            // Apply the responsive zoom factor
            ctx.scale(cameraZoom, cameraZoom);
            // Move origin back so (0,0) is top-left of the game arena
            ctx.translate(-WORLD_WIDTH / 2, -WORLD_HEIGHT / 2);

            // 5. Draw Green Background Arena
            ctx.fillStyle = '#228B22'; // Forest Green
            ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);

            // 6. Draw Grid (so you can visually see the background scaling out)
            drawGrid(50);

            // 7. Draw Red Box
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(box.x, box.y, box.size, box.size);

            // 8. Restore context so scaling doesn't break future UI elements
            ctx.restore();

            requestAnimationFrame(update);
        }

        requestAnimationFrame(update);
    </script>
</body>
</html>
