<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover helps handle mobile URL bars and safe zones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Canvas Scale Test</title>
    <style>
        /* Lock down document scrolling entirely to prevent mobile screen bouncing */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed; 
            background-color: #111; /* Dark background */
        }

        canvas {
            display: block; /* Removes blank inline spacing at the bottom */
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Define your internal, fixed game design resolution
        const VIRTUAL_WIDTH = 800;
        const VIRTUAL_HEIGHT = 600;

        function resizeCanvas() {
            // Force the canvas back-buffer to match the true visible mobile viewport
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Instantly re-render the game frame when resizing or rotating
            drawGame();
        }

        function drawGame() {
            // Clear the entire screen
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Save current drawing state
            ctx.save();
            
            // Calculate scale factors to match the current inner window sizes
            const scaleX = canvas.width / VIRTUAL_WIDTH;
            const scaleY = canvas.height / VIRTUAL_HEIGHT;
            
            // Distort/stretch the drawing context matrix to fit the screen bounds
            ctx.scale(scaleX, scaleY);
            
            // -------------------------------------------------------------
            // DRAW STUFF HERE USING FIXED 800x600 VIRTUAL COORDINATES
            // -------------------------------------------------------------
            
            // Draw a blue background border box
            ctx.fillStyle = '#1e1e24';
            ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

            // Draw a green square in the upper-left area
            ctx.fillStyle = '#4caf50';
            ctx.fillRect(50, 50, 150, 150);

            // Draw a red square in the center area
            ctx.fillStyle = '#f44336';
            ctx.fillRect(325, 225, 150, 150);

            // Draw text to visually double-check screen tracking info
            ctx.fillStyle = '#ffffff';
            ctx.font = '24px sans-serif';
            ctx.fillText('Mobile URL Scale Test', 50, VIRTUAL_HEIGHT - 80);
            ctx.font = '16px sans-serif';
            ctx.fillText(`Canvas Dimensions: ${canvas.width}x${canvas.height}`, 50, VIRTUAL_HEIGHT - 40);
            
            // -------------------------------------------------------------
            
            // Restore drawing state
            ctx.restore();
        }

        // Event listeners for resize and device flip changes
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', resizeCanvas);

        // Run immediately on page initialization
        resizeCanvas();
    </script>
</body>
</html>
