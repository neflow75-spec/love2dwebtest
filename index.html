        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const playBtn = document.getElementById('playButton');

        // Retro arcade layout proportions (Tall portrait frame)
        const VIRTUAL_WIDTH = 450;
        const VIRTUAL_HEIGHT = 600;

        // Scaling tracking variables for translating touch grid points
        let currentScale = 1;
        let offsetX = 0;
        let offsetY = 0;

        // --- GAME STATES ---
        const STATE_START = 0;
        const STATE_PLAYING = 1;
        const STATE_GAMEOVER = 2;
        let gameState = STATE_START;

        // --- GAME OBJECTS & CONFIG ---
        let score = 0;
        let highScore = 0;

        const bird = {
            x: 100,
            y: 250,
            radius: 14,
            velocity: 0,
            gravity: 0.4,
            jump: -7.5
        };

        let pipes = [];
        const pipeConfig = {
            width: 65,
            gap: 130,
            speed: 2.5,
            spawnRate: 90, // Frames between spawn cycles
            timer: 0
        };

        // --- UNLOCK FULLSCREEN ENGINE ---
        playBtn.addEventListener('click', () => {
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) docElm.requestFullscreen();
            else if (docElm.webkitRequestFullscreen) docElm.webkitRequestFullscreen();

            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                resetGame();
                // Start tracking logic frame intervals safely
                setInterval(updateGame, 1000 / 60); 
                requestAnimationFrame(renderLoop);
            }, 300);
            
            resizeCanvas();
        });

        // --- RESPONSIVE LETTERBOX MATH ---
        function resizeCanvas() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            currentScale = Math.min(windowWidth / VIRTUAL_WIDTH, windowHeight / VIRTUAL_HEIGHT);
            
            offsetX = (windowWidth - (VIRTUAL_WIDTH * currentScale)) / 2;
            offsetY = (windowHeight - (VIRTUAL_HEIGHT * currentScale)) / 2;

            canvas.width = windowWidth;
            canvas.height = windowHeight;
        }

        // --- INPUT CONTROLS ---
        function handleAction(e) {
            e.preventDefault(); // Stop mobile browsers from zooming on rapid clicks
            
            if (gameState === STATE_START) {
                gameState = STATE_PLAYING;
                bird.velocity = bird.jump;
            } else if (gameState === STATE_PLAYING) {
                bird.velocity = bird.jump;
            } else if (gameState === STATE_GAMEOVER) {
                resetGame();
                gameState = STATE_PLAYING;
            }
        }

        // Universal Event Triggers
        window.addEventListener('mousedown', handleAction);
        window.addEventListener('touchstart', handleAction, { passive: false });
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') handleAction(e); });

        // Window state mutations
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', resizeCanvas);

        // --- ENGINE LOGIC ---
        function resetGame() {
            bird.y = 250;
            bird.velocity = 0;
            pipes = [];
            pipeConfig.timer = 0;
            score = 0;
        }

        function updateGame() {
            if (gameState !== STATE_PLAYING) return;

            // Physics processing
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // Roof & Floor boundary collapse checks
            if (bird.y - bird.radius < 0) bird.y = bird.radius;
            if (bird.y + bird.radius >= VIRTUAL_HEIGHT - 50) {
                endGame();
            }

            // Pipe pipeline lifecycle adjustments
            pipeConfig.timer++;
            if (pipeConfig.timer >= pipeConfig.spawnRate) {
                pipeConfig.timer = 0;
                // Generate safe random corridor heights
                const minHeight = 50;
                const maxHeight = VIRTUAL_HEIGHT - 50 - pipeConfig.gap - minHeight;
                const topPipeHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;

                pipes.push({
                    x: VIRTUAL_WIDTH,
                    topHeight: topPipeHeight,
                    passed: false
                });
            }

            // Cycle pipeline calculations
            for (let i = pipes.length - 1; i >= 0; i--) {
                const p = pipes[i];
                p.x -= pipeConfig.speed;

                // Collision tracking checks
                if (
                    bird.x + bird.radius > p.x && 
                    bird.x - bird.radius < p.x + pipeConfig.width
                ) {
                    if (bird.y - bird.radius < p.topHeight || bird.y + bird.radius > p.topHeight + pipeConfig.gap) {
                        endGame();
                    }
                }

                // Score metric processing
                if (!p.passed && p.x + pipeConfig.width / 2 < bird.x) {
                    p.passed = true;
                    score++;
                    if (score > highScore) highScore = score;
                }

                // Clean memory boundaries
                if (p.x + pipeConfig.width < 0) {
                    pipes.splice(i, 1);
                }
            }
        }

        function endGame() {
            gameState = STATE_GAMEOVER;
        }

        // --- DRAWING LOOPS ---
        function renderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            
            // Lock graphics grid within letterbox boundaries
            ctx.translate(offsetX, offsetY);
            ctx.scale(currentScale, currentScale);

            // Draw Background Sky
            ctx.fillStyle = '#4ec0ca';
            ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

            // Render Obstacles Pipeline
            pipes.forEach(p => {
                ctx.fillStyle = '#73bf2e';
                ctx.strokeStyle = '#558022';
                ctx.lineWidth = 4;

                // Top Pipe component
                ctx.fillRect(p.x, 0, pipeConfig.width, p.topHeight);
                ctx.strokeRect(p.x, 0, pipeConfig.width, p.topHeight);

                // Bottom Pipe component
                const bottomY = p.topHeight + pipeConfig.gap;
                const bottomH = VIRTUAL_HEIGHT - 50 - bottomY;
                ctx.fillRect(p.x, bottomY, pipeConfig.width, bottomH);
                ctx.strokeRect(p.x, bottomY, pipeConfig.width, bottomH);
            });

            // Draw Base Floor Bed
            ctx.fillStyle = '#d4a373';
            ctx.fillRect(0, VIRTUAL_HEIGHT - 50, VIRTUAL_WIDTH, 50);
            ctx.fillStyle = '#55a630';
            ctx.fillRect(0, VIRTUAL_HEIGHT - 50, VIRTUAL_WIDTH, 12);

            // Draw Player Bird Capsule
            ctx.fillStyle = '#f7e652';
            ctx.strokeStyle = '#000';

            ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
